<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>회원가입 페이지</title>

  <style>
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header h1 {
      margin: 0;
    }

    form {
      max-width: 500px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group > label:first-child {
      display: inline-block;
      width: 120px;
    }

    input,
    select,
    button {
      padding: 8px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      min-width: 250px;
    }

    .selection-group label {
      width: auto;
      margin-right: 10px;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>회원가입</h1>

    <button
      type="button"
      onclick="location.href='index.html'"
    >
      메인페이지로 이동
    </button>
  </div>

  <p>아래 양식을 작성하여 회원가입을 진행하세요.</p>

  <form id="signup-form">
    <div class="form-group">
      <label for="username">사용자 이름:</label>

      <input
        type="text"
        id="username"
        name="username"
        required
        placeholder="사용자 이름을 입력하세요"
      >
    </div>

    <div class="form-group">
      <label for="user-id">아이디:</label>

      <input
        type="text"
        id="user-id"
        name="userId"
        required
        minlength="4"
        maxlength="12"
        pattern="[A-Za-z0-9]{4,12}"
        title="영문과 숫자만 사용하여 4~12자로 입력하세요."
        placeholder="영문/숫자 4~12자"
      >
    </div>

    <div class="form-group">
      <label for="email">이메일:</label>

      <input
        type="email"
        id="email"
        name="email"
        required
        placeholder="이메일을 입력하세요"
      >
    </div>

    <div class="form-group">
      <label for="password">비밀번호:</label>

      <input
        type="password"
        id="password"
        name="password"
        required
        minlength="8"
        maxlength="20"
        pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,20}$"
        title="영문, 숫자, 특수문자를 포함하여 8~20자로 입력하세요."
        placeholder="영문, 숫자, 특수문자 포함 8~20자"
      >
    </div>

    <div class="form-group">
      <label for="confirm-password">비밀번호 확인:</label>

      <input
        type="password"
        id="confirm-password"
        name="confirmPassword"
        required
        placeholder="비밀번호를 다시 입력하세요"
      >
    </div>

    <div class="form-group selection-group">
      <span>성별:</span>

      <input
        type="radio"
        id="male"
        name="gender"
        value="male"
        required
      >
      <label for="male">남성</label>

      <input
        type="radio"
        id="female"
        name="gender"
        value="female"
      >
      <label for="female">여성</label>
    </div>

    <div class="form-group selection-group">
      <span>관심 분야:</span>

      <input
        type="checkbox"
        id="design"
        name="interests"
        value="design"
      >
      <label for="design">디자인</label>

      <input
        type="checkbox"
        id="frontend"
        name="interests"
        value="frontend"
      >
      <label for="frontend">프론트엔드</label>

      <input
        type="checkbox"
        id="backend"
        name="interests"
        value="backend"
      >
      <label for="backend">백엔드</label>

      <input
        type="checkbox"
        id="ai"
        name="interests"
        value="ai"
      >
      <label for="ai">AI</label>
    </div>

    <div class="form-group">
      <label for="region">지역:</label>

      <select id="region" name="region" required>
        <option value="" selected disabled>
          지역을 선택하세요
        </option>

        <option value="seoul">서울</option>
        <option value="gwangju">광주</option>
        <option value="ulsan">울산</option>
      </select>
    </div>

    <button type="submit">회원가입</button>
  </form>

  <script>
    const form = document.getElementById("signup-form");
    const password = document.getElementById("password");
    const confirmPassword =
      document.getElementById("confirm-password");

    function validatePassword() {
      if (password.value !== confirmPassword.value) {
        confirmPassword.setCustomValidity(
          "비밀번호가 일치하지 않습니다."
        );
      } else {
        confirmPassword.setCustomValidity("");
      }
    }

    password.addEventListener("input", validatePassword);
    confirmPassword.addEventListener("input", validatePassword);

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      validatePassword();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const userId =
        document.getElementById("user-id").value.trim();

      const users = JSON.parse(
        localStorage.getItem("users") || "[]"
      );

      const duplicateId = users.some(function (user) {
        return user.userId === userId;
      });

      if (duplicateId) {
        alert("이미 사용 중인 아이디입니다.");
        document.getElementById("user-id").focus();
        return;
      }

      const selectedInterests = [
        ...document.querySelectorAll(
          'input[name="interests"]:checked'
        )
      ].map(function (checkbox) {
        return checkbox.value;
      });

      const user = {
        username:
          document.getElementById("username").value.trim(),

        userId: userId,

        email:
          document.getElementById("email").value.trim(),

        gender:
          document.querySelector(
            'input[name="gender"]:checked'
          ).value,

        interests: selectedInterests,

        region:
          document.getElementById("region").value
      };

      users.push(user);

      localStorage.setItem(
        "users",
        JSON.stringify(users)
      );

      location.href = "result.html";
    });
  </script>
</body>
</html>
