<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="여행의 발견 회원가입 페이지"><title>회원가입 — 여행의 발견</title><link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header"><div class="container nav-wrap"><a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true">✦</span> 여행의 발견</a><button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false">☰</button><nav class="site-nav" aria-label="주요 메뉴"><a href="index.html">홈</a><a href="result.html">회원 목록</a><a class="nav-cta" aria-current="page" href="signup.html">함께하기</a></nav></div></header>
  <main>
    <section class="page-hero container"><p class="eyebrow">Join the Journey</p><h1 class="display-title">여행의 시작은<br>새로운 만남부터</h1><p class="section-copy">기본 정보를 입력하고 여행의 발견과 함께하세요.</p></section>
    <div class="container form-layout">
      <aside class="form-intro"><p class="eyebrow">Welcome</p><h2>당신의 다음 여행을<br>더 특별하게</h2><ul><li>✓ 관심사에 맞는 여행 아이디어</li><li>✓ 저장되는 나만의 회원 정보</li><li>✓ 언제든 확인 가능한 회원 목록</li></ul></aside>
      <form id="signup-form" class="form-card">
        <div class="form-grid">
          <div class="form-group"><label for="username">사용자 이름</label><input type="text" id="username" name="username" required placeholder="이름을 입력하세요" autocomplete="name"></div>
          <div class="form-group"><label for="user-id">아이디</label><input type="text" id="user-id" name="userId" required minlength="4" maxlength="12" pattern="[A-Za-z0-9]{4,12}" title="영문과 숫자만 사용하여 4~12자로 입력하세요." placeholder="영문/숫자 4~12자" autocomplete="username"></div>
          <div class="form-group full"><label for="email">이메일</label><input type="email" id="email" name="email" required placeholder="travel@example.com" autocomplete="email"></div>
          <div class="form-group"><label for="password">비밀번호</label><input type="password" id="password" name="password" required minlength="8" maxlength="20" pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&amp;])[A-Za-z\d@$!%*#?&amp;]{8,20}$" title="영문, 숫자, 특수문자를 포함하여 8~20자로 입력하세요." placeholder="영문·숫자·특수문자 포함" autocomplete="new-password"></div>
          <div class="form-group"><label for="confirm-password">비밀번호 확인</label><input type="password" id="confirm-password" name="confirmPassword" required placeholder="한 번 더 입력하세요" autocomplete="new-password"></div>
          <fieldset class="form-group full" style="border:0;padding:0;margin:0"><legend class="field-label">성별</legend><div class="choice-group"><input type="radio" id="male" name="gender" value="male" required><label for="male">남성</label><input type="radio" id="female" name="gender" value="female"><label for="female">여성</label></div></fieldset>
          <fieldset class="form-group full" style="border:0;padding:0;margin:0"><legend class="field-label">여행 취향</legend><div class="choice-group"><input type="checkbox" id="food" name="interests" value="food"><label for="food">맛집 탐방</label><input type="checkbox" id="nature" name="interests" value="nature"><label for="nature">자연·힐링</label><input type="checkbox" id="culture" name="interests" value="culture"><label for="culture">문화·역사</label><input type="checkbox" id="activity" name="interests" value="activity"><label for="activity">액티비티</label></div></fieldset>
          <div class="form-group full"><label for="region">거주지</label><select id="region" name="region" required><option value="" selected disabled>거주지를 선택하세요</option><option value="seoul">서울</option><option value="gwangju">광주</option><option value="ulsan">울산</option><option value="busan">부산</option><option value="jeju">제주</option><option value="gyeongju">경주</option></select></div>
        </div>
        <div class="form-actions"><a class="button secondary" href="index.html">돌아가기</a><button class="button" type="submit">회원가입 완료</button></div>
      </form>
    </div>
  </main>
  <footer class="site-footer"><div class="container footer-wrap"><span>© <span data-year></span> 여행의 발견 · 김지원</span><a class="back-top" href="index.html">메인으로 →</a></div></footer>
  <script type="module" src="assets/js/common.js"></script><script type="module" src="assets/js/signup.js"></script>
</body>
</html>
