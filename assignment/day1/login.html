<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="여행의 발견 로그인 페이지"><title>로그인 — 여행의 발견</title><link rel="stylesheet" href="assets/css/style.css?v=2">
  <meta name="author" content="김지원">
</head>
<body id="top">
  <header class="site-header"><div class="container nav-wrap"><a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true">✦</span> 여행의 발견</a><button class="menu-toggle" type="button" aria-label="메뉴 열기" aria-expanded="false">☰</button><nav class="site-nav" aria-label="주요 메뉴"><a href="index.html">홈</a><a href="index.html#destinations">추천 도시</a><a aria-current="page" href="login.html">로그인</a><a class="nav-cta" href="signup.html">회원가입</a></nav></div></header>
  <main>
    <section class="page-hero container"><p class="eyebrow">Welcome Back</p><h1 class="display-title">다시 여행을<br>이어가세요</h1><p class="section-copy">회원가입한 아이디와 비밀번호로 로그인하세요.</p></section>
    <div class="container auth-layout">
      <form id="login-form" class="form-card auth-card">
        <div class="form-group"><label for="login-id">아이디</label><input id="login-id" type="text" required autocomplete="username" placeholder="아이디를 입력하세요"></div>
        <div class="form-group"><label for="login-password">비밀번호</label><input id="login-password" type="password" required autocomplete="current-password" placeholder="비밀번호를 입력하세요"></div>
        <p id="login-notice" class="form-notice" role="status" hidden></p>
        <p id="login-error" class="form-error" role="alert" hidden></p>
        <button id="login-submit" class="button" type="submit">로그인</button>
        <p class="auth-help">아직 계정이 없나요? <a href="signup.html">회원가입하기</a></p>
      </form>
    </div>
  </main>
  <footer class="site-footer"><div class="container footer-wrap"><span>© <span data-year></span> 여행의 발견 · 김지원</span><a class="back-top" href="#top">↑ 맨 위로</a></div></footer>
  <script type="module" src="assets/js/core/common.js"></script><script type="module" src="assets/js/pages/login.js"></script>
</body>
</html>
