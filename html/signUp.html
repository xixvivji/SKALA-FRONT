<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="../css/style.css">

</head>

<body>
 <div class="container">
  <h1>👤 회원가입</h1>

  <p>SKALA-FRONT 회원가입을 환영합니다.</p>

  <form action="signUpResult.html" method="get">
    <fieldset>
      <legend>계정 정보</legend>

      <p>
        <label for="user-id">아이디:</label>

        <input
          type="text"
          id="user-id"
          name="userId"
          required
          minlength="4"
          maxlength="15"
          pattern="[A-Za-z0-9]{4,15}"
          placeholder="4~15자 영문/숫자"
        >

        <span>(필수)</span>
      </p>

      <p>
        <label for="password">비밀번호:</label>

        <input
          type="password"
          id="password"
          name="password"
          required
          minlength="8"
          placeholder="8자 이상 입력"
        >

        <span>(필수)</span>
      </p>

      <p>
        <label for="email">이메일:</label>

        <input
          type="text"
          id="email"
          name="email"
          required
          placeholder="example"
        >

        <span>@</span>

        <select name="emailDomain" required>
          <option value="">선택하세요</option>
          <option value="naver.com">naver.com</option>
          <option value="gmail.com">gmail.com</option>
          
        </select>
      </p>
    </fieldset>

    <br>

    <fieldset>
      <legend>개인 프로필 정보</legend>

      <p>
        <label for="username">이름:</label>

        <input
          type="text"
          id="username"
          name="username"
          required
        >
      </p>

      <p>
        <label for="birthdate">생년월일:</label>

        <input
          type="date"
          id="birthdate"
          name="birthdate"
          required
        >
      </p>

      <p>
        <span>성별:</span>

        <input
          type="radio"
          id="male"
          name="gender"
          value="male"
          required
        >
        <label for="male">남성</label>

        <input
          type="radio"
          id="female"
          name="gender"
          value="female"
        >
        <label for="female">여성</label>

        <input
          type="radio"
          id="none"
          name="gender"
          value="none"
        >
        <label for="none">선택 안 함</label>
      </p>

      <div>
        <span>관심 분야 (중복 선택 가능):</span>

        <p>
          <input
            type="checkbox"
            id="frontend"
            name="interests"
            value="frontend"
          >
          <label for="frontend">
            웹 프론트엔드 (Vue.js/HTML)
          </label>

          <br>

          <input
            type="checkbox"
            id="design"
            name="interests"
            value="design"
          >
          <label for="design">
            UI/UX 디자인 표준
          </label>

          <br>

          <input
            type="checkbox"
            id="backend"
            name="interests"
            value="backend"
          >
          <label for="backend">
            백엔드 &amp; 데이터베이스
          </label>

          <br>

          <input
            type="checkbox"
            id="cloud"
            name="interests"
            value="cloud"
          >
          <label for="cloud">
            클라우드 &amp; 인프라
          </label>
        </p>
      </div>

      <p>
        <label for="join-path">가입 경로:</label>

        <select
          id="join-path"
          name="joinPath"
          required
        >
          <option value="">선택해 주세요</option>
          <option value="search">인터넷 검색</option>
          <option value="friend">친구 추천</option>
          <option value="other">기타</option>
        </select>
      </p>
    </fieldset>

    <br>

    <fieldset>
      <legend>자기소개</legend>

      <p>
        <label for="introduction">
          나를 표현하는 한 줄 소개 또는 가입 인사:
        </label>
      </p>

      <textarea
        id="introduction"
        name="introduction"
        rows="6"
        cols="50"
        maxlength="200"
        placeholder="자기소개 내용을 입력하세요. 최대 200자"
      ></textarea>
    </fieldset>

    <br>

    <button type="submit">회원가입 완료하기</button>
    <button type="reset">다시 작성</button>
  </form>
 </div>
</body>
</html>
