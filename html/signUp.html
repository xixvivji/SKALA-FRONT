<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <h1>회원가입</h1>
    <form action="signUpResult.html" method="get">
        <fieldset>
            <legend>회원가입 정보</legend>
            <label for="username">사용자 이름:</label>
            <input type="text" id="username" name="username" required placeholder="4~15자 영문/숫자"><br><br>

            <label for="email">이메일:</label>
            <input type="email" id="email" name="email" required placeholder="example@email.com"><br><br>

            <label for="password">비밀번호:</label>
            <input type="password" id="password" name="password" required placeholder="8자 이상 입력"><br><br>

            <input type="submit" value="가입하기">
        </fieldset>


    </form>
</body>
</html>
