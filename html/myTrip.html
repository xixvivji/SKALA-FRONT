<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>나의 여행지</title>

  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="container">
    <h1>🌍 나의 여행 앨범 🎵</h1>

    <audio controls>
      <source src="audio/travel.mp3" type="audio/mpeg">
      브라우저가 오디오 재생을 지원하지 않습니다.
    </audio>

    <p class="trip-card">
      <img
        src="img/seoul1.jpg"
        alt="서울의 첫 번째 여행지 풍경"
      >

      서울의 첫 번째 여행지
    </p>

    <p class="trip-card">
      <img
        src="img/seoul2.jpg"
        alt="서울의 두 번째 여행지 풍경"
      >

      서울의 두 번째 여행지
    </p>

    <p class="trip-card">
      <img
        src="img/seoul3.jpg"
        alt="서울의 세 번째 여행지 풍경"
      >

      서울의 세 번째 여행지
    </p>

    <h2>🎥 나의 여행 브이로그</h2>

    <video
      controls
      width="500"
      poster="img/seoul1.jpg"
    >
      <source
        src="video/travel.mp4"
        type="video/mp4"
      >

      브라우저가 영상 재생을 지원하지 않습니다.
    </video>
  </div>
</body>
</html>
